name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore WindowsCleaner.sln

      - name: Build Core, CLI and Tests
        # The WinUI app requires Windows App SDK workloads; the engine, CLI and
        # tests build cross-checkable on the hosted runner.
        run: |
          dotnet build src/WindowsCleaner.Core/WindowsCleaner.Core.csproj -c Release --no-restore
          dotnet build src/WindowsCleaner.Cli/WindowsCleaner.Cli.csproj -c Release --no-restore
          dotnet build tests/WindowsCleaner.Core.Tests/WindowsCleaner.Core.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/WindowsCleaner.Core.Tests/WindowsCleaner.Core.Tests.csproj -c Release --no-build --verbosity normal
