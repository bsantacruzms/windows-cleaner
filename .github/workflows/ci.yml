name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore WindowsCleaner.sln

      - name: Build
        run: dotnet build WindowsCleaner.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/WindowsCleaner.Core.Tests/WindowsCleaner.Core.Tests.csproj -c Release --no-build --verbosity normal
